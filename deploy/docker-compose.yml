# Despliegue local / demo (criterio 7 de la rúbrica)
# Uso: docker compose -f deploy/docker-compose.yml up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: citas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/citas
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - chroma:/app/chroma_db

volumes:
  pgdata:
  chroma:
